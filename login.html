<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeRefine — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #080c14;
      --surface:   #0f1623;
      --border:    #1e2d45;
      --accent:    #00d4ff;
      --accent2:   #7c3aed;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --danger:    #f87171;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      font-family: 'Syne', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridPan 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridPan { to { background-position: 40px 40px; } }

    /* Glowing orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: var(--accent);  top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -4s; }
    @keyframes float {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(20px, -20px); }
    }

    .card {
      position: relative;
      width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      box-shadow: 0 0 60px rgba(0,212,255,0.05), 0 20px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 40px; right: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(0,212,255,0.3);
    }
    .logo h1 {
      font-size: 26px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    .logo p {
      color: var(--muted);
      font-size: 13px;
      font-family: 'Space Mono', monospace;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
    }
    input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px 12px 42px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Space Mono', monospace;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), #0099cc);
      border: none;
      border-radius: 10px;
      color: #080c14;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.5px;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(0,212,255,0.3);
    }
    .btn-login:hover  { opacity: 0.9; box-shadow: 0 6px 30px rgba(0,212,255,0.5); }
    .btn-login:active { transform: scale(0.98); }

    .demo-box {
      margin-top: 24px;
      padding: 14px 16px;
      background: rgba(0,212,255,0.04);
      border: 1px dashed var(--border);
      border-radius: 10px;
      text-align: center;
    }
    .demo-box p { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 600; letter-spacing: 0.5px; }
    .demo-box code {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      display: block;
      line-height: 1.8;
    }
    .btn-demo {
      margin-top: 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--accent);
      font-size: 12px;
      padding: 6px 16px;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-demo:hover { background: rgba(0,212,255,0.08); border-color: var(--accent); }

    .error-msg {
      color: var(--danger);
      font-size: 12px;
      margin-top: 6px;
      display: none;
      font-family: 'Space Mono', monospace;
    }

    .footer {
      text-align: center;
      margin-top: 28px;
      font-size: 12px;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <h1>CodeRefine</h1>
      <p>AI-Powered Code Analysis &amp; Rewriting</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <div class="input-wrap">
        <span class="input-icon">✉</span>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="off" />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <p class="error-msg" id="errorMsg">❌ Invalid credentials. Use the demo login below.</p>
    </div>

    <button class="btn-login" onclick="handleLogin()">→ Sign In</button>

    <div class="demo-box">
      <p>DEMO CREDENTIALS</p>
      <code>
        Email: demo@coderefine.ai<br />
        Password: password123
      </code>
      <button class="btn-demo" onclick="fillDemo()">⚡ Auto-fill Demo</button>
    </div>

    <div class="footer">Powered by Groq + Llama 3.3 70B</div>
  </div>

  <script>
    function fillDemo() {
      document.getElementById('email').value    = 'demo@coderefine.ai';
      document.getElementById('password').value = 'password123';
    }

    function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const pass  = document.getElementById('password').value;
      const err   = document.getElementById('errorMsg');

      if (email === 'demo@coderefine.ai' && pass === 'password123') {
        err.style.display = 'none';
        document.querySelector('.btn-login').textContent = '✓ Redirecting...';
        setTimeout(() => { window.location.href = '/app'; }, 600);
      } else {
        err.style.display = 'block';
      }
    }

    // Allow Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
