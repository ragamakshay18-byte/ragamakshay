<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🤖 AI Code Review & Rewrite Agent</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Highlight.js -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0a0e1a;
      --surface: #111827;
      --surface2: #1a2235;
      --border: #1e2d45;
      --accent: #00d4ff;
      --accent2: #7c3aed;
      --green: #00ff88;
      --red: #ff4757;
      --orange: #ff6b35;
      --yellow: #ffd32a;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(124, 58, 237, 0.05) 0%, transparent 60%);
    }

    .mono { font-family: 'JetBrains Mono', monospace; }

    /* Header */
    header {
      border-bottom: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.8);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100;
    }

    /* Glow effects */
    .glow-accent { box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
    .glow-green  { box-shadow: 0 0 20px rgba(0, 255, 136, 0.2); }

    /* Textarea */
    textarea {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      resize: vertical;
      background: #0d1117;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 16px;
      width: 100%;
      transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    /* Select */
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:focus { outline: none; border-color: var(--accent); }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(0, 212, 255, 0.3); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 12px 28px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-copy {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Syne', sans-serif;
    }
    .btn-copy:hover { color: var(--accent); border-color: var(--accent); }

    /* Severity badges */
    .badge-critical { background: rgba(255,71,87,0.15); color: var(--red);    border: 1px solid rgba(255,71,87,0.3);    border-radius: 6px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
    .badge-high     { background: rgba(255,107,53,0.15); color: var(--orange); border: 1px solid rgba(255,107,53,0.3); border-radius: 6px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
    .badge-medium   { background: rgba(255,211,42,0.15); color: var(--yellow); border: 1px solid rgba(255,211,42,0.3); border-radius: 6px; padding: 2px 10px; font-size: 11px; font-weight: 600; }
    .badge-low      { background: rgba(0,255,136,0.15);  color: var(--green);  border: 1px solid rgba(0,255,136,0.3);  border-radius: 6px; padding: 2px 10px; font-size: 11px; font-weight: 600; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    /* Output area */
    .output-box {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      min-height: 100px;
    }

    /* Markdown rendered output */
    .markdown-body h1, .markdown-body h2, .markdown-body h3 {
      color: var(--accent); margin: 16px 0 8px; font-weight: 600;
    }
    .markdown-body p  { margin: 8px 0; line-height: 1.7; color: var(--text); }
    .markdown-body ul { padding-left: 20px; margin: 8px 0; }
    .markdown-body li { margin: 4px 0; line-height: 1.6; }
    .markdown-body code {
      background: rgba(0,212,255,0.1);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    .markdown-body pre {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .markdown-body pre code {
      background: none; color: inherit; padding: 16px; display: block;
    }
    .markdown-body strong { color: #fff; }

    /* Loader */
    .loader {
      display: inline-block;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Tab */
    .tab-btn {
      padding: 10px 20px;
      border-radius: 8px 8px 0 0;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      background: transparent;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
    }
    .tab-btn.active {
      background: var(--surface);
      border-color: var(--border);
      border-bottom-color: var(--surface);
      color: var(--accent);
    }

    /* Checkbox */
    .focus-checkbox { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }

    /* Pulse animation for live indicator */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .pulse { animation: pulse 2s ease-in-out infinite; }

    /* Fade in */
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .fade-in { animation: fadeIn 0.4s ease forwards; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-3xl">🤖</span>
      <div>
        <h1 class="text-xl font-bold" style="color: var(--accent)">AI Code Review & Rewrite Agent</h1>
        <p class="text-xs" style="color: var(--muted)">Powered by Groq · Llama 3.3 70B</p>
      </div>
    </div>
    <div class="flex items-center gap-2 text-xs" style="color: var(--green)">
      <span class="pulse">●</span> Live
    </div>
  </div>
</header>

<!-- ── Main ── -->
<main class="max-w-7xl mx-auto px-6 py-8">

  <!-- Stats Row -->
  <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
    <div class="card text-center">
      <div class="text-2xl font-bold" style="color:var(--red)" id="stat-critical">0</div>
      <div class="text-xs mt-1" style="color:var(--muted)">Critical</div>
    </div>
    <div class="card text-center">
      <div class="text-2xl font-bold" style="color:var(--orange)" id="stat-high">0</div>
      <div class="text-xs mt-1" style="color:var(--muted)">High</div>
    </div>
    <div class="card text-center">
      <div class="text-2xl font-bold" style="color:var(--yellow)" id="stat-medium">0</div>
      <div class="text-xs mt-1" style="color:var(--muted)">Medium</div>
    </div>
    <div class="card text-center">
      <div class="text-2xl font-bold" style="color:var(--green)" id="stat-low">0</div>
      <div class="text-xs mt-1" style="color:var(--muted)">Low</div>
    </div>
  </div>

  <!-- Two column layout -->
  <div class="grid md:grid-cols-2 gap-6">

    <!-- LEFT: Input Panel -->
    <div class="flex flex-col gap-4">

      <!-- Language & Options -->
      <div class="card">
        <h2 class="text-sm font-semibold mb-4" style="color:var(--muted)"><i class="fa-solid fa-gear mr-2"></i>CONFIGURATION</h2>
        <div class="flex flex-col gap-4">

          <!-- Language -->
          <div>
            <label class="text-xs mb-2 block" style="color:var(--muted)">LANGUAGE</label>
            <select id="language" class="w-full">
              <option value="python">Python</option>
              <option value="javascript">JavaScript</option>
              <option value="java">Java</option>
              <option value="cpp">C++</option>
              <option value="typescript">TypeScript</option>
              <option value="go">Go</option>
              <option value="rust">Rust</option>
              <option value="php">PHP</option>
              <option value="ruby">Ruby</option>
              <option value="sql">SQL</option>
            </select>
          </div>

          <!-- Focus Areas -->
          <div>
            <label class="text-xs mb-2 block" style="color:var(--muted)">FOCUS AREAS</label>
            <div class="grid grid-cols-2 gap-2">
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" class="focus-checkbox" value="bugs" checked> Bugs
              </label>
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" class="focus-checkbox" value="security" checked> Security
              </label>
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" class="focus-checkbox" value="performance" checked> Performance
              </label>
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" class="focus-checkbox" value="best practices" checked> Best Practices
              </label>
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" class="focus-checkbox" value="readability"> Readability
              </label>
              <label class="flex items-center gap-2 text-sm cursor-pointer">
                <input type="checkbox" class="focus-checkbox" value="maintainability"> Maintainability
              </label>
            </div>
          </div>
        </div>
      </div>

      <!-- Code Input -->
      <div class="card flex-1">
        <div class="flex items-center justify-between mb-3">
          <h2 class="text-sm font-semibold" style="color:var(--muted)"><i class="fa-solid fa-code mr-2"></i>YOUR CODE</h2>
          <button class="btn-copy" onclick="clearCode()"><i class="fa-solid fa-trash mr-1"></i>Clear</button>
        </div>
        <textarea id="code-input" rows="18" placeholder="// Paste your code here..."></textarea>
      </div>

      <!-- Action Buttons -->
      <div class="flex gap-3">
        <button class="btn-primary flex-1" id="btn-review" onclick="reviewCode()">
          <i class="fa-solid fa-magnifying-glass"></i> Review Code
        </button>
        <button class="btn-secondary flex-1" id="btn-rewrite" onclick="rewriteCode()" disabled>
          <i class="fa-solid fa-wand-magic-sparkles"></i> Rewrite Code
        </button>
      </div>
    </div>

    <!-- RIGHT: Output Panel -->
    <div class="flex flex-col gap-4">

      <!-- Tabs -->
      <div class="flex gap-1 border-b" style="border-color:var(--border)">
        <button class="tab-btn active" id="tab-review" onclick="switchTab('review')">
          <i class="fa-solid fa-list-check mr-2"></i>Review
        </button>
        <button class="tab-btn" id="tab-rewrite" onclick="switchTab('rewrite')">
          <i class="fa-solid fa-code mr-2"></i>Rewritten Code
        </button>
      </div>

      <!-- Review Output -->
      <div id="panel-review" class="card flex-1 fade-in">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-semibold" style="color:var(--muted)"><i class="fa-solid fa-clipboard-check mr-2"></i>REVIEW RESULTS</h2>
          <button class="btn-copy" onclick="copyOutput('review-output')"><i class="fa-solid fa-copy mr-1"></i>Copy</button>
        </div>
        <div class="output-box markdown-body" id="review-output" style="min-height:400px">
          <div class="flex flex-col items-center justify-center h-40 gap-3" style="color:var(--muted)">
            <i class="fa-solid fa-robot text-4xl" style="color:var(--border)"></i>
            <p class="text-sm">Paste your code and click <strong style="color:var(--accent)">Review Code</strong> to start</p>
          </div>
        </div>
      </div>

      <!-- Rewrite Output -->
      <div id="panel-rewrite" class="card flex-1 hidden fade-in">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-sm font-semibold" style="color:var(--muted)"><i class="fa-solid fa-wand-magic-sparkles mr-2"></i>OPTIMIZED CODE</h2>
          <button class="btn-copy" onclick="copyOutput('rewrite-output')"><i class="fa-solid fa-copy mr-1"></i>Copy</button>
        </div>
        <div class="output-box markdown-body" id="rewrite-output" style="min-height:400px">
          <div class="flex flex-col items-center justify-center h-40 gap-3" style="color:var(--muted)">
            <i class="fa-solid fa-wand-magic-sparkles text-4xl" style="color:var(--border)"></i>
            <p class="text-sm">Click <strong style="color:var(--accent)">Rewrite Code</strong> after reviewing</p>
          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<!-- ── Scripts ── -->
<script>
  let lastReviewText = "";

  // ── Tab switching ──────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('panel-review').classList.toggle('hidden', tab !== 'review');
    document.getElementById('panel-rewrite').classList.toggle('hidden', tab !== 'rewrite');
    document.getElementById('tab-review').classList.toggle('active', tab === 'review');
    document.getElementById('tab-rewrite').classList.toggle('active', tab === 'rewrite');
  }

  // ── Get focus areas ────────────────────────────────────────
  function getFocusAreas() {
    return Array.from(document.querySelectorAll('.focus-checkbox:checked')).map(cb => cb.value);
  }

  // ── Set loading state ──────────────────────────────────────
  function setLoading(btnId, loading, label, icon) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="loader"></span> Analyzing...`
      : `<i class="fa-solid fa-${icon}"></i> ${label}`;
  }

  // ── Review Code ────────────────────────────────────────────
  async function reviewCode() {
    const code = document.getElementById('code-input').value.trim();
    const language = document.getElementById('language').value;
    if (!code) { alert('Please paste your code first!'); return; }

    setLoading('btn-review', true);
    document.getElementById('review-output').innerHTML = `
      <div class="flex items-center gap-3 p-4" style="color:var(--muted)">
        <span class="loader"></span> <span>Analyzing your code with Llama 3.3 70B...</span>
      </div>`;

    try {
      const res = await fetch('/review', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, language, focus_areas: getFocusAreas() })
      });

      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();

      lastReviewText = data.review;

      // Update stats
      const counts = data.parsed.counts;
      document.getElementById('stat-critical').textContent = counts.critical || 0;
      document.getElementById('stat-high').textContent     = counts.high || 0;
      document.getElementById('stat-medium').textContent   = counts.medium || 0;
      document.getElementById('stat-low').textContent      = counts.low || 0;

      // Render markdown
      document.getElementById('review-output').innerHTML = marked.parse(data.review);
      document.querySelectorAll('#review-output pre code').forEach(el => hljs.highlightElement(el));

      // Enable rewrite button
      document.getElementById('btn-rewrite').disabled = false;
      switchTab('review');

    } catch (err) {
      document.getElementById('review-output').innerHTML =
        `<div style="color:var(--red)"><i class="fa-solid fa-circle-exclamation mr-2"></i>${err.message}</div>`;
    } finally {
      setLoading('btn-review', false, 'Review Code', 'magnifying-glass');
    }
  }

  // ── Rewrite Code ───────────────────────────────────────────
  async function rewriteCode() {
    const code = document.getElementById('code-input').value.trim();
    const language = document.getElementById('language').value;
    if (!code) return;

    setLoading('btn-rewrite', true);
    switchTab('rewrite');
    document.getElementById('rewrite-output').innerHTML = `
      <div class="flex items-center gap-3 p-4" style="color:var(--muted)">
        <span class="loader"></span> <span>Rewriting and optimizing your code...</span>
      </div>`;

    try {
      const res = await fetch('/rewrite', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, language, review_feedback: lastReviewText })
      });

      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();

      document.getElementById('rewrite-output').innerHTML = marked.parse(data.rewritten_code);
      document.querySelectorAll('#rewrite-output pre code').forEach(el => hljs.highlightElement(el));

    } catch (err) {
      document.getElementById('rewrite-output').innerHTML =
        `<div style="color:var(--red)"><i class="fa-solid fa-circle-exclamation mr-2"></i>${err.message}</div>`;
    } finally {
      setLoading('btn-rewrite', false, 'Rewrite Code', 'wand-magic-sparkles');
    }
  }

  // ── Copy Output ────────────────────────────────────────────
  function copyOutput(elementId) {
    const text = document.getElementById(elementId).innerText;
    navigator.clipboard.writeText(text).then(() => {
      const btns = document.querySelectorAll('.btn-copy');
      btns.forEach(btn => {
        if (btn.getAttribute('onclick')?.includes(elementId)) {
          const orig = btn.innerHTML;
          btn.innerHTML = '<i class="fa-solid fa-check mr-1"></i>Copied!';
          btn.style.color = 'var(--green)';
          setTimeout(() => { btn.innerHTML = orig; btn.style.color = ''; }, 2000);
        }
      });
    });
  }

  // ── Clear Code ─────────────────────────────────────────────
  function clearCode() {
    document.getElementById('code-input').value = '';
    document.getElementById('review-output').innerHTML = `
      <div class="flex flex-col items-center justify-center h-40 gap-3" style="color:var(--muted)">
        <i class="fa-solid fa-robot text-4xl" style="color:var(--border)"></i>
        <p class="text-sm">Paste your code and click <strong style="color:var(--accent)">Review Code</strong> to start</p>
      </div>`;
    document.getElementById('rewrite-output').innerHTML = `
      <div class="flex flex-col items-center justify-center h-40 gap-3" style="color:var(--muted)">
        <i class="fa-solid fa-wand-magic-sparkles text-4xl" style="color:var(--border)"></i>
        <p class="text-sm">Click <strong style="color:var(--accent)">Rewrite Code</strong> after reviewing</p>
      </div>`;
    ['stat-critical','stat-high','stat-medium','stat-low'].forEach(id =>
      document.getElementById(id).textContent = '0');
    document.getElementById('btn-rewrite').disabled = true;
    lastReviewText = "";
    switchTab('review');
  }

  // Init highlight.js
  hljs.highlightAll();
</script>
</body>
</html>
